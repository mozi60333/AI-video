<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载资源...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .loader-box { text-align: center; background: white; padding: 40px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ff0050; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- TikTok Pixel 基础代码 -->
    <script>
    !function (w, d, t) {
      w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};

      ttq.load('D8948SJC77U5H2VHFUV0');
      ttq.page();
    }(window, document, 'ttq');
    </script>
</head>
<body>

    <div class="loader-box">
        <div class="spinner"></div>
        <p>资源正在安全加载，请稍候...</p>
    </div>

    <script>
        // 页面加载完成后立即执行
        window.onload = function() {
            // 生成两个唯一的 Event ID 用于去重
            const payEventId = 'pay_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            const dlEventId = 'dl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

            // --- 1. 浏览器 Pixel 发送 ---
            // 发送付费事件
            ttq.track('CompletePayment', {
                content_name: 'Auto_Package',
                value: 29.9,
                currency: 'USD'
            }, { event_id: payEventId });

            // 发送下载事件
            ttq.track('Download', {
                content_name: 'App_Download'
            }, { event_id: dlEventId });


            // --- 2. 服务器 API (CAPI) 发送 ---
            // 通知后端 PHP 同步发送这两个事件
            fetch('track_api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    events: [
                        { name: 'CompletePayment', id: payEventId, value: 29.9 },
                        { name: 'Download', id: dlEventId, value: 0 }
                    ],
                    url: window.location.href
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log('CAPI 回传成功');
                // 这里可以设置加载完后的跳转，比如跳转到真正的下载链接或官网
                // setTimeout(() => { window.location.href = "https://your-real-site.com"; }, 2000);
            })
            .catch(err => console.error('CAPI 失败', err));
        };
    </script>
</body>
</html>
