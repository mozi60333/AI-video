<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载安全资源...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #ffffff; color: #333; }
        .content { text-align: center; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #00f2ea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- TikTok Pixel Base Code -->
    <script>
    !function (w, d, t) {
      w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};

      // 初始化 3 个 Pixel
      ttq.load('D8948SJC77U5H2VHFUV0');
      ttq.load('D894CDJC77UAN3U855EG');
      ttq.load('D894ASJC77UA33STHFS0');

      ttq.page();
    }(window, document, 'ttq');
    </script>
</head>
<body>

<div class="content">
    <div class="loader"></div>
    <p>正在验证您的访问权限，请稍后...</p>
</div>

<script>
    window.onload = function() {
        // 生成两个唯一的 Event ID 用于去重
        const payId = 'pay_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const dlId = 'dl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

        // 1. 浏览器端（Pixel）自动触发
        // 付费事件
        ttq.track('CompletePayment', {
            value: 49.9,
            currency: 'USD',
            content_type: 'product',
            content_id: 'auto_1'
        }, { event_id: payId });

        // 下载事件
        ttq.track('Download', {
            content_name: 'App_Package'
        }, { event_id: dlId });

        // 2. 服务器端（CAPI）自动触发
        // 将请求发给后端的 PHP 脚本
        fetch('track_api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                events: [
                    { name: 'CompletePayment', id: payId, value: 49.9 },
                    { name: 'Download', id: dlId, value: 0 }
                ],
                url: window.location.href
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log('API 回传响应:', data);
            // 这里可以设置回传成功后的动作，比如重定向到下载页或 App Store
            // window.location.href = "https://apps.apple.com/xxx"; 
        })
        .catch(err => console.error('API 错误:', err));
    };
</script>

</body>
</html>
