<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | ADXJ Growth Network</title>
    <style>
        :root {
            --bg: #06111f;
            --ink: #f7fbff;
            --muted: #8fa6bf;
            --line: rgba(255, 255, 255, 0.13);
            --blue: #35a7ff;
            --cyan: #53f4d0;
            --gold: #ffd166;
            --deep: #091a2d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 14%, rgba(53, 167, 255, 0.26), transparent 30%),
                radial-gradient(circle at 76% 8%, rgba(83, 244, 208, 0.16), transparent 28%),
                linear-gradient(145deg, #040a13 0%, var(--bg) 48%, #02040a 100%);
            color: var(--ink);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), transparent 86%);
            pointer-events: none;
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 18px;
            position: relative;
        }

        .shell {
            width: min(100%, 1040px);
            display: grid;
            grid-template-columns: 1.02fr 0.98fr;
            align-items: center;
            gap: 34px;
            position: relative;
            z-index: 1;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-height: 42px;
            margin-bottom: 24px;
            color: var(--cyan);
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(83, 244, 208, 0.34);
            border-radius: 8px;
            background: rgba(83, 244, 208, 0.08);
            color: #06111f;
            position: relative;
            overflow: hidden;
        }

        .brand-mark::before {
            content: "";
            width: 25px;
            height: 18px;
            border-radius: 55% 55% 45% 45%;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            box-shadow: 14px 3px 0 rgba(53, 167, 255, 0.72);
            transform: rotate(-10deg);
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            color: var(--gold);
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
        }

        .kicker::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 18px var(--gold);
        }

        h1 {
            margin: 0;
            font-size: clamp(50px, 12vw, 124px);
            line-height: 0.86;
            font-weight: 1000;
        }

        h1 span {
            display: block;
            margin-top: 8px;
            font-size: clamp(28px, 5vw, 62px);
            color: var(--cyan);
        }

        .copy {
            max-width: 560px;
            margin: 24px 0 0;
            color: #c6d6e8;
            font-size: 18px;
            line-height: 1.55;
            font-weight: 650;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 18px;
            border-radius: 8px;
            border: 1px solid transparent;
            color: #03101d;
            background: linear-gradient(135deg, #ffffff, #d8fff5);
            font-size: 15px;
            font-weight: 950;
            text-decoration: none;
            box-shadow: 0 16px 40px rgba(83, 244, 208, 0.22);
        }

        .btn.secondary {
            color: var(--ink);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--line);
            box-shadow: none;
        }

        .radar {
            aspect-ratio: 1;
            width: min(100%, 460px);
            margin: 0 auto;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 50%;
            background:
                radial-gradient(circle, rgba(83, 244, 208, 0.14) 0 7%, transparent 8%),
                repeating-radial-gradient(circle, transparent 0 22%, rgba(255, 255, 255, 0.09) 22.5% 23%, transparent 23.5% 45%),
                linear-gradient(145deg, rgba(53, 167, 255, 0.12), rgba(83, 244, 208, 0.04));
            box-shadow:
                inset 0 0 70px rgba(53, 167, 255, 0.12),
                0 28px 80px rgba(0, 0, 0, 0.42);
            overflow: hidden;
        }

        .radar::before {
            content: "";
            position: absolute;
            inset: 0;
            background: conic-gradient(from 40deg, rgba(83, 244, 208, 0.54), transparent 30%, transparent 100%);
            animation: sweep 4.8s linear infinite;
            transform-origin: center;
        }

        .radar::after {
            content: "404";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(247, 251, 255, 0.92);
            font-size: clamp(76px, 15vw, 136px);
            font-weight: 1000;
            text-shadow: 0 0 34px rgba(83, 244, 208, 0.28);
        }

        .whale {
            position: absolute;
            left: 50%;
            top: 52%;
            width: 158px;
            height: 66px;
            transform: translate(-50%, -50%);
            border-radius: 70% 48% 52% 65%;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            opacity: 0.18;
            filter: blur(0.2px);
        }

        .whale::before {
            content: "";
            position: absolute;
            right: -28px;
            top: 15px;
            width: 42px;
            height: 34px;
            background: var(--blue);
            clip-path: polygon(0 50%, 100% 0, 72% 50%, 100% 100%);
        }

        .node {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 22px var(--gold);
        }

        .node.one { left: 28%; top: 18%; }
        .node.two { right: 24%; top: 34%; background: var(--cyan); box-shadow: 0 0 22px var(--cyan); }
        .node.three { left: 35%; bottom: 19%; background: var(--blue); box-shadow: 0 0 22px var(--blue); }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 28px;
            max-width: 560px;
        }

        .card {
            min-height: 92px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.055);
        }

        .card b {
            display: block;
            color: var(--ink);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .card span {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
            font-weight: 650;
        }

        @keyframes sweep {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 820px) {
            body {
                overflow-y: auto;
            }

            .page {
                place-items: start center;
                padding: 22px 16px 28px;
            }

            .shell {
                grid-template-columns: 1fr;
                gap: 26px;
            }

            .radar {
                width: min(82vw, 390px);
                order: -1;
            }

            .brand {
                margin-bottom: 16px;
            }

            .copy {
                font-size: 16px;
                margin-top: 18px;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="shell" aria-labelledby="title">
            <div>
                <div class="brand">
                    <span class="brand-mark" aria-hidden="true"></span>
                    <span>AD XJ Growth Network · Blue Whale</span>
                </div>
                <p class="kicker">Signal lost / route recalculating</p>
                <h1 id="title">404<span>增长航线偏航</span></h1>
                <p class="copy">这条路径暂时没有可用落点。蓝鲸网络的增长雷达已经重新扫描全球流量、开发者服务与买量中枢，带你回到 ADXJ.COM。</p>
                <div class="actions">
                    <a class="btn" href="https://adxj.com/" rel="noopener">前往 ADXJ.COM</a>
                    <a class="btn secondary" href="https://adxj.com/#contact" rel="noopener">联系合作</a>
                </div>
                <div class="cards" aria-label="ADXJ highlights">
                    <div class="card">
                        <b>Elite Community</b>
                        <span>出海精英交流社群与行业情报。</span>
                    </div>
                    <div class="card">
                        <b>Dev & Tech</b>
                        <span>开发者、上架、账号与技术服务。</span>
                    </div>
                    <div class="card">
                        <b>Growth Buying</b>
                        <span>全球效果营销与全渠道媒体买量。</span>
                    </div>
                </div>
            </div>
            <div class="radar" aria-hidden="true">
                <span class="whale"></span>
                <span class="node one"></span>
                <span class="node two"></span>
                <span class="node three"></span>
            </div>
        </section>
    </main>
</body>
</html>
