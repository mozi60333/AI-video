<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Video Magic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- TikTok Pixel Code -->
    <script>
    !function (w, d, t) {
      w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};
      
      // 初始化 TikTok 像素 ID
      ttq.load('D7PPBS3C77U9TECLDLSG');
      ttq.page();
    }(window, document, 'ttq');
    </script>
    <!-- End TikTok Pixel Code -->

    <style>
        body { background-color: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        .touch-dot { width: 40px; height: 40px; background: rgba(255, 255, 255, 0.4); border: 2px solid #fff; border-radius: 50%; position: absolute; z-index: 999; pointer-events: none; transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); transform: scale(0); opacity: 0; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .scan-line { position: absolute; width: 100%; height: 30px; background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.8), transparent); opacity: 0; z-index: 10; }
        .flying-photo { position: absolute; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); z-index: 50; border-radius: 12px; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-glow { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); transition: all 0.3s; }
        .sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px 25px 20px; background: linear-gradient(to top, rgba(5,5,5,1) 75%, transparent); z-index: 1000; }
        
        #result-overlay { border-radius: inherit; }
        #demo-video { border-radius: inherit; }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-[120px]">

    <div id="cursor" class="touch-dot"></div>

    <!-- 顶部 -->
    <header class="flex justify-between items-center px-5 pt-6 pb-2 max-w-md mx-auto w-full">
        <i class="fas fa-chevron-left text-lg"></i>
        <h1 class="text-xl font-bold tracking-wide">Upload</h1>
        <div class="w-5"></div>
    </header>
    <p class="text-center text-gray-300 text-xs font-medium mb-4 px-4">Upload a clear photo for best results.</p>

    <!-- 主展示区 -->
    <div class="px-5 relative z-10 w-full max-w-md mx-auto">
        <div id="main-board" class="border-[1.5px] border-[#3b2a5c] rounded-[24px] aspect-[3/4] relative overflow-hidden flex flex-col justify-between p-4 bg-[#0a0a0c]">
            
            <!-- 上传位/预览槽 -->
            <div id="thumbnail-slot" class="w-[28%] aspect-[3/4] rounded-[16px] border border-[#3b2a5c] bg-[#1a1a24] overflow-hidden relative">
                <img id="uploaded-preview" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-300">
                <div id="scanner" class="scan-line hidden"></div>
            </div>

            <div class="flex justify-center mb-2">
                <div class="bg-[#21212b] px-6 py-2.5 rounded-full text-xs font-semibold text-gray-200 flex items-center gap-2 border border-white/5">
                    <i class="fas fa-sync-alt text-[#a855f7]"></i> Change
                </div>
            </div>

            <!-- 视频结果 -->
            <div id="result-overlay" class="absolute inset-0 bg-black z-20 hidden opacity-0 transition-opacity duration-500 overflow-hidden">
                <video id="demo-video" class="w-full h-full object-cover" muted playsinline loop></video>
                <div class="absolute top-4 right-4 bg-black/60 px-3 py-1 rounded-full border border-white/20 flex items-center gap-1.5 z-30">
                    <i class="fas fa-check-circle text-green-400 text-xs"></i>
                    <span class="text-[10px] font-bold">Done</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 相册区 -->
    <div class="px-5 mt-6 w-full max-w-md mx-auto">
        <div class="flex justify-between items-center mb-2 px-1">
            <h2 class="text-[15px] font-bold tracking-wide">Gallery</h2>
            <i class="fas fa-ellipsis-h text-gray-500"></i>
        </div>
        
        <!-- 相册网格 -->
        <div class="flex gap-2 w-full">
            <div id="gallery-0" class="flex-1 aspect-square rounded-[12px] overflow-hidden relative border-2 border-transparent transition-all">
                <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-15_21-03-01.jpg?w=300" class="w-full h-full object-cover">
            </div>
            <div id="gallery-1" class="flex-1 aspect-square rounded-[12px] overflow-hidden relative border-2 border-transparent transition-all">
                <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-17-33.jpg?w=300" class="w-full h-full object-cover">
            </div>
            <div id="gallery-2" class="flex-1 aspect-square rounded-[12px] overflow-hidden relative border-2 border-transparent transition-all">
                <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-16-19.jpg?w=300" class="w-full h-full object-cover">
            </div>
            <div id="gallery-3" class="flex-1 aspect-square rounded-[12px] overflow-hidden relative border-2 border-transparent transition-all">
                <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-15_21-03-01.jpg?w=300" class="w-full h-full object-cover grayscale-[30%]">
            </div>
        </div>
    </div>

    <!-- 生成按钮区 -->
    <div class="px-5 mt-6 flex flex-col items-center w-full max-w-md mx-auto relative z-10">
        <div class="flex items-center gap-1.5 text-[13px] font-bold text-[#eab308] mb-3 tracking-wide">
            <i class="fas fa-coins text-sm"></i>
            <span class="text-white">Cost: 60.0</span>
            <i class="fas fa-coins text-sm"></i>
        </div>
        
        <div id="generate-btn" class="w-full bg-[#a855f7] btn-glow text-white py-3.5 rounded-full font-bold text-[16px] flex items-center justify-center gap-2">
            <i class="fas fa-wand-magic-sparkles"></i> <span id="btn-text">Generate</span>
        </div>
    </div>

    <!-- 悬浮下载按钮 -->
    <div class="sticky-cta flex justify-center">
        <button onclick="handleAdjustDownload()" class="w-full max-w-md bg-white text-black h-[54px] rounded-[18px] font-black text-[17px] flex items-center justify-center shadow-[0_10px_30px_rgba(255,255,255,0.2)] active:scale-95 transition-transform">
            DOWNLOAD APP NOW
        </button>
    </div>

    <script>
        // ==========================================
        // 1. TikTok & Adjust S2S 数据透传逻辑 
        // ==========================================
        function handleAdjustDownload() {
            console.log("--- 开始处理 TikTok 广告数据追踪 ---");
            
            // 触发 TikTok 前端像素 Download 事件
            if (typeof ttq !== 'undefined') ttq.track('Download');

            // 提取网页 URL 参数
            const urlParams = new URLSearchParams(window.location.search);

            // 动态提取 TikTok 宏参数
            const campaign = urlParams.get('campaign') || '__CAMPAIGN_NAME__ (__CAMPAIGN_ID__)';
            const adgroup = urlParams.get('adgroup') || '__AID_NAME__ (__AID__)';
            const creative = urlParams.get('creative') || '__CID_NAME__ (__CID__)';
            const ttclid = urlParams.get('ttclid') || '__callback_param__';
            const adgroup_id = urlParams.get('adgroup_id') || '__AID__';
            const ip_address = urlParams.get('ip_address') || '__IP__';
            const user_agent = urlParams.get('user_agent') || '__UA__';
            const campaign_id = urlParams.get('campaign_id') || '__CAMPAIGN_ID__';
            const creative_id = urlParams.get('creative_id') || '__CID__';
            const tiktok_placement = urlParams.get('tiktok_placement') || '__PLACEMENT__';

            // 最新的 TikTok 像素与 Token 配置
            const tiktok_pixel_id = 'D7PPBS3C77U9TECLDLSG';
            const tiktok_access_token = '975c3cadf3f4b5d1582dfd6cead4c890e944f3b5';

            // --- 构建传给 APP 的 Deep Link ---
            const deepLinkParams = new URLSearchParams(window.location.search);
            
            // 确保 App 能拿到 Token 和 Pixel ID 来做服务器回传 (CAPI)
            deepLinkParams.set('tiktok_pixel_id', tiktok_pixel_id);
            deepLinkParams.set('tiktok_access_token', tiktok_access_token);

            const appScheme = "pictopop://open";
            const fullDeepLink = appScheme + "?" + deepLinkParams.toString();

            // --- 构造最终发给 Adjust S2S 的链接 ---
            let finalUrl = `https://s2s.adjust.com/20wy75ju` +
                `?campaign=${encodeURIComponent(campaign)}` +
                `&adgroup=${encodeURIComponent(adgroup)}` +
                `&creative=${encodeURIComponent(creative)}` +
                `&ttclid=${ttclid}` +
                `&adgroup_id=${adgroup_id}` +
                `&ip_address=${ip_address}` +
                `&user_agent=${user_agent}` +
                `&campaign_id=${campaign_id}` +
                `&creative_id=${creative_id}` +
                `&tracker_limit=250000` +
                `&tiktok_placement=${tiktok_placement}` +
                `&external_tracker_ids=1` +
                `&tiktok_pixel_id=${tiktok_pixel_id}` +
                `&tiktok_access_token=${tiktok_access_token}` +
                `&deep_link=${encodeURIComponent(fullDeepLink)}`;

            console.log("最终跳转完整链接: \n", finalUrl);

            // 延迟跳转以保证 TikTok 前端像素发送成功
            setTimeout(() => { window.location.href = finalUrl; }, 400);
        }

        // ==========================================
        // 2. 自动化 UI 演示逻辑 (保持不变)
        // ==========================================
        const cursor = document.getElementById('cursor');
        const targetSlot = document.getElementById('thumbnail-slot');
        const uploadedPreview = document.getElementById('uploaded-preview');
        const generateBtn = document.getElementById('generate-btn');
        const btnText = document.getElementById('btn-text');
        const scanner = document.getElementById('scanner');
        const resultOverlay = document.getElementById('result-overlay');
        const demoVideo = document.getElementById('demo-video');

        const demoAssets = [
            { id: 'gallery-0', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-15_21-03-01.jpg?w=300', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/%E5%90%8E%E5%85%A5%E6%89%AD%E8%87%80.mp4' },
            { id: 'gallery-1', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-17-33.jpg?w=300', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/3-2.mp4' },
            { id: 'gallery-2', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-16-19.jpg?w=300', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/3-1.mp4' },
            { id: 'gallery-3', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-15_21-03-01.jpg?w=300', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/%E5%90%8E%E5%85%A5%E6%89%AD%E8%87%80.mp4' }
        ];

        async function runAutoDemo() {
            let index = 0;
            while (true) {
                const current = demoAssets[index % demoAssets.length];
                const activeGalleryThumb = document.getElementById(current.id);
                
                await resetUI();
                
                await moveAndTap(activeGalleryThumb);
                activeGalleryThumb.classList.add('border-[#a855f7]', 'scale-95');
                
                flyPhoto(current.img, activeGalleryThumb);
                await sleep(700);
                uploadedPreview.src = current.img;
                uploadedPreview.style.opacity = '1';
                
                await moveAndTap(generateBtn);
                generateBtn.classList.remove('bg-[#a855f7]', 'btn-glow');
                generateBtn.classList.add('bg-[#4b5563]');
                btnText.innerText = 'Processing...';
                
                await runScanner();
                showResult(current.vid);
                await sleep(4000); 
                
                activeGalleryThumb.classList.remove('border-[#a855f7]', 'scale-95');
                index++;
            }
        }

        async function resetUI() {
            resultOverlay.style.opacity = '0';
            setTimeout(() => { resultOverlay.style.display = 'none'; }, 400);
            uploadedPreview.style.opacity = '0';
            generateBtn.classList.remove('bg-[#4b5563]');
            generateBtn.classList.add('bg-[#a855f7]', 'btn-glow');
            btnText.innerText = 'Generate';
            document.querySelectorAll('.flying-photo').forEach(el => el.remove());
            await sleep(800);
        }

        async function moveAndTap(target) {
            const rect = target.getBoundingClientRect();
            cursor.style.opacity = '1';
            cursor.style.transform = 'scale(1)';
            cursor.style.left = (rect.left + rect.width/2 - 20) + 'px';
            cursor.style.top = (rect.top + rect.height/2 - 20) + 'px';
            await sleep(600); 
            
            cursor.style.transform = 'scale(0.7)';
            target.style.transform = 'scale(0.95)';
            await sleep(150);
            
            cursor.style.transform = 'scale(1)';
            target.style.transform = 'scale(1)';
            await sleep(200);
            cursor.style.opacity = '0';
            await sleep(200);
        }

        function flyPhoto(url, sourceElement) {
            const photo = document.createElement('img');
            photo.src = url;
            photo.className = 'flying-photo'; 
            const startRect = sourceElement.getBoundingClientRect();
            
            photo.style.left = startRect.left + 'px';
            photo.style.top = startRect.top + 'px';
            photo.style.width = startRect.width + 'px';
            photo.style.height = startRect.height + 'px';
            document.body.appendChild(photo);
            
            const targetRect = targetSlot.getBoundingClientRect();
            setTimeout(() => {
                photo.style.left = targetRect.left + 'px';
                photo.style.top = targetRect.top + 'px';
                photo.style.width = targetRect.width + 'px';
                photo.style.height = targetRect.height + 'px';
                photo.style.opacity = '0'; 
            }, 50);
        }

        async function runScanner() {
            scanner.style.display = 'block';
            scanner.style.opacity = '1';
            for(let p = -20; p <= 100; p += 4) {
                scanner.style.top = p + '%';
                await sleep(35);
            }
            scanner.style.opacity = '0';
            setTimeout(() => { scanner.style.display = 'none'; }, 200);
        }

        function showResult(vidUrl) {
            resultOverlay.style.display = 'block';
            void resultOverlay.offsetWidth;
            resultOverlay.style.opacity = '1';
            demoVideo.src = vidUrl;
            demoVideo.play().catch(e => {});
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        window.onload = () => { setTimeout(runAutoDemo, 500); };
    </script>
</body>
</html>
