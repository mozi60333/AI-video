<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spicy Slider App Promo (Direct Cut)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Mobile Screen Container (Green Screen Background) */
        #video-container { position: relative; width: 380px; height: 676px; background: #00FF00; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Top TikTok Style Text */
        .top-text { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.65); color: #FFF; padding: 12px 18px; border-radius: 12px; font-weight: 700; text-align: center; width: 85%; font-size: 17px; line-height: 1.4; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; }

        /* Bottom Slider UI */
        .slider-container { position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; width: 96%; color: white; font-weight: 900; font-size: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
        .slider-track { flex-grow: 1; height: 14px; background: rgba(255, 255, 255, 0.4); border-radius: 7px; position: relative; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .slider-fill { width: 25%; height: 100%; background: #FFF; border-radius: 7px; box-shadow: 0 0 5px rgba(255,255,255,0.8); }
        .slider-thumb { position: absolute; top: 50%; left: 25%; transform: translate(-50%, -50%); width: 32px; height: 32px; background: #FFF; border-radius: 50%; box-shadow: 0 0 12px rgba(0,0,0,0.6); }
        .cursor { position: absolute; top: 25px; left: 25%; transform: translateX(-35%); font-size: 60px; text-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        /* App Download CTA Screen (Direct Cut) */
        #cta-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0A0A0C; z-index: 150; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.3s ease-in; }
        
        /* App Store Card UI */
        .app-card { background: #1C1C1E; width: 85%; border-radius: 20px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 30px; }
        
        .app-header { display: flex; align-items: center; width: 100%; gap: 15px; margin-bottom: 20px; }
        
        /* App Icon Image */
        .app-icon-img { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .app-title-box { display: flex; flex-direction: column; justify-content: center; }
        .app-name { color: #FFF; font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
        .app-dev { color: #8E8E93; font-size: 14px; font-weight: 500; }

        /* App Stats (Rating, Age, Downloads) */
        .app-stats { display: flex; width: 100%; justify-content: space-between; align-items: center; background: #2C2C2E; padding: 12px 15px; border-radius: 12px; box-sizing: border-box; }
        .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .stat-val { color: #FFF; font-size: 16px; font-weight: 700; }
        .stat-lbl { color: #8E8E93; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .stat-divider { width: 1px; height: 24px; background: #48484A; }

        /* Pitch Text */
        .cta-text { color: #FFF; font-size: 20px; font-weight: bold; text-align: center; line-height: 1.5; margin-bottom: 30px; width: 90%; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .cta-text span { color: #fe2c55; /* TikTok Red */ }
        
        /* Download Button */
        .download-btn { background: #fe2c55; color: white; padding: 16px 0; width: 85%; border-radius: 12px; font-size: 20px; font-weight: 800; text-align: center; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4); animation: pulse 1.5s infinite; }
        
        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4); }
            50% { transform: scale(1.04); box-shadow: 0 4px 25px rgba(254, 44, 85, 0.7); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Start Helper Button */
        #start-btn { position: absolute; z-index: 200; padding: 15px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 30px; background: #FFF; color: #000; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.2s; }
        #start-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- START BUTTON -->
    <button id="start-btn">▶ Start Animation</button>

    <div id="video-container">
        <!-- TOP TEXT -->
        <div class="top-text" id="top-text">Testing the new 'Late-Night' slider on this AI app... 🤫</div>

        <!-- SLIDER UI -->
        <div class="slider-container" id="slider-ui">
            <span>[Basic]</span>
            <div class="slider-track">
                <div class="slider-fill" id="fill"></div>
                <div class="slider-thumb" id="thumb"></div>
                <div class="cursor" id="cursor">👆</div>
            </div>
            <span>[Secret]</span>
        </div>

        <!-- APP STORE DOWNLOAD CTA (Shown instantly after 3.5s) -->
        <div id="cta-screen">
            
            <div class="app-card">
                <div class="app-header">
                    <!-- App Icon -->
                    <img class="app-icon-img" src="https://is1-ssl.mzstatic.com/image/thumb/PurpleSource211/v4/12/aa/83/12aa83c2-1147-f358-b741-7e3886ea3c46/Placeholder.mill/200x200bb-75.webp" alt="App Icon">
                    
                    <div class="app-title-box">
                        <div class="app-name">Dynamic Stylized Avatar</div>
                        <div class="app-dev">Stylized photography</div>
                    </div>
                </div>

                <div class="app-stats">
                    <div class="stat-item">
                        <div class="stat-val">4.9 ★</div>
                        <div class="stat-lbl">120K Ratings</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-val">17+</div>
                        <div class="stat-lbl">Age</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-val">Trending</div>
                        <div class="stat-lbl">Now</div>
                    </div>
                </div>
            </div>

            <!-- Pitch Text -->
            <div class="cta-text">
                Tap the button below to get the app and<br>
                <span>unlock the "Late-Night" mode 🤫</span>
            </div>

            <!-- Download Button -->
            <div class="download-btn">⬇ Install Now</div>
            
        </div>
    </div>

    <script>
        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none'; 

            let progress = 25; // Starts at 25%
            const fill = document.getElementById('fill');
            const thumb = document.getElementById('thumb');
            const cursor = document.getElementById('cursor');
            
            const topText = document.getElementById('top-text');
            const sliderUi = document.getElementById('slider-ui');
            const ctaScreen = document.getElementById('cta-screen');

            // Slide duration: 3.5 seconds (3500ms)
            const duration = 3500; 
            const interval = 20; 
            const step = ((95 - 25) / (duration / interval));

            const timer = setInterval(() => {
                progress += step;
                if (progress >= 95) {
                    clearInterval(timer);
                    
                    // 瞬间隐藏原有的 UI 界面
                    topText.style.display = 'none';
                    sliderUi.style.display = 'none';
                    
                    // 没有任何延迟，直接展示 APP 下载页
                    ctaScreen.style.display = 'flex';

                } else {
                    // 更新进度条位置
                    fill.style.width = progress + '%';
                    thumb.style.left = progress + '%';
                    cursor.style.left = progress + '%';
                }
            }, interval);
        });
    </script>
</body>
</html>
