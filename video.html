<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Video Magic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Meta Pixel Code (Facebook 像素) -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    
    // 更新为你新链接中的 Pixel ID
    fbq('init', '968820212523051'); 
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=968820212523051&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->

    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; margin: 0; }
        .touch-dot { width: 35px; height: 35px; background: rgba(255, 255, 255, 0.3); border: 2px solid #fff; border-radius: 50%; position: absolute; z-index: 100; pointer-events: none; transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); transform: scale(0); opacity: 0; }
        .scan-line { position: absolute; width: 100%; height: 60px; background: linear-gradient(to bottom, transparent, #8b5cf6, transparent); opacity: 0; z-index: 50; }
        #result-overlay { position: absolute; inset: 0; background: #000; z-index: 60; display: none; opacity: 0; transition: opacity 0.4s; }
        .sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, #000 85%, transparent); z-index: 100; }
        .flying-photo { position: absolute; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 40; border-radius: 20px; object-fit: cover; }
        .glow { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); } 50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.5); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- 头部 -->
    <header class="pt-6 px-6 text-center fixed top-0 w-full z-50">
        <div class="text-xl font-black italic tracking-tighter">AI<span class="text-purple-500">MAGIC</span></div>
        <div class="mt-1 h-[2px] w-12 bg-purple-600 mx-auto rounded-full"></div>
    </header>

    <!-- 演示台 -->
    <div id="stage" class="flex-1 relative flex flex-col items-center pt-24">
        <div id="cursor" class="touch-dot"></div>
        <div id="main-slot" class="w-[280px] h-[380px] border-2 border-dashed border-gray-800 rounded-[30px] flex flex-col items-center justify-center text-gray-700 bg-gray-900/20 glow relative overflow-hidden">
            <div class="flex flex-col items-center opacity-40">
                <i class="fas fa-plus-circle text-4xl mb-4"></i>
                <span class="text-[10px] font-bold tracking-[0.3em]">UPLOAD PHOTO</span>
            </div>
            <div id="scanner" class="scan-line"></div>
        </div>

        <!-- 底部缩略图 -->
        <div class="absolute bottom-36 left-0 right-0 px-6">
            <div class="flex justify-center gap-3">
                <div id="asset-1" class="w-16 h-16 bg-gray-800 rounded-xl overflow-hidden border border-white/10 active:scale-90 transition-transform">
                    <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-15_21-03-01.jpg?w=480&h=704" class="w-full h-full object-cover">
                </div>
                <div id="asset-2" class="w-16 h-16 bg-gray-800 rounded-xl overflow-hidden border border-white/10 active:scale-90 transition-transform">
                    <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-17-33.jpg?w=480&h=704" class="w-full h-full object-cover">
                </div>
                <div id="asset-3" class="w-16 h-16 bg-gray-800 rounded-xl overflow-hidden border border-white/10 active:scale-90 transition-transform">
                    <img src="https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-16-19.jpg?w=480&h=704" class="w-full h-full object-cover">
                </div>
            </div>
            <div id="fake-btn" class="mt-8 w-full py-4 bg-gray-900 border border-purple-900/30 rounded-2xl text-center text-gray-400 font-black tracking-[0.2em] transition-all">GENERATE VIDEO</div>
        </div>

        <!-- 视频结果层 -->
        <div id="result-overlay">
            <video id="demo-video" class="w-full h-full object-cover" muted playsinline loop></video>
            <div class="absolute top-10 left-0 right-0 flex justify-center">
                <span class="bg-purple-600 text-white px-5 py-1.5 rounded-full text-[11px] font-black tracking-widest shadow-xl">AI GENERATED</span>
            </div>
        </div>
    </div>

    <!-- 下载按钮区域 -->
    <div class="sticky-cta">
        <button onclick="handleAdjustDownload()" class="w-full bg-white text-black h-16 rounded-[20px] font-black text-lg flex items-center justify-center gap-3 shadow-[0_10px_40px_rgba(139,92,246,0.4)] active:scale-95 transition-transform">
            Download Now
        </button>
        <p class="text-center text-gray-500 text-[9px] mt-3 tracking-[0.2em]">FAST AI • HD EXPORT • FREE TRIAL</p>
    </div>

    <script>
    function handleAdjustDownload() {
        console.log("--- 1. 开始处理下载追踪 ---");

        // 1. 触发 Facebook 像素 (trackCustom 以消除警告)
        if (typeof fbq !== 'undefined') {
            fbq('trackCustom', 'Download');
            console.log("--- 2. FB Pixel 事件已发送 (trackCustom) ---");
        }

        // 获取当前页面 URL 参数
        const searchParams = new URLSearchParams(window.location.search);
        const fbclid = searchParams.get('fbclid');
        const allSearch = window.location.search; 

        // 2. 构造内部 Deep Link
        const appScheme = "pictopop://open";
        const fullDeepLink = allSearch ? (appScheme + allSearch) : appScheme;
        const encodedDeepLink = encodeURIComponent(fullDeepLink);

        // 3. 使用你提供的新 Adjust 链接作为基础链接
        let finalUrl = "https://app.adjust.com/1zolxg53" +
                       "?campaign={{campaign.name}}%20%28{{campaign.id}}%29" +
                       "&adgroup={{adset.name}}%20%28{{adset.id}}%29" +
                       "&creative={{ad.name}}%20%28{{ad.id}}%29" +
                       "&fb_pixel_id=968820212523051" +
                       "&fb_access_token=EAAYZBZC3ZCKRg4BRc87sLyr4RSvoiPjKgn8S5UiOoZAVPqOxgd5ZC9GpuzERXET12j7ChxM7USFyh49pZBu9JTFtkZCKuZBBiRFoqiCOQFN6AvcU2d1Cvg9xJn9WpBaoTNE8G9F4MDu3YtteoAv5dZBYcqrk6AvHd1Nigw1ujxU23J7ZCh4OyDOEl4dfgRvpXaYwpZB8gZDZD";
        
        // 关键：动态追加 fbclid (如果用户点击FB广告进来，URL中会有fbclid，需传给Adjust后端)
        if (fbclid) {
            finalUrl += "&fbclid=" + fbclid;
            console.log("--- 3. 检测到 fbclid 并已附加到根链接:", fbclid);
        }

        // 关键：附加 deep_link (给 App 内部用)
        finalUrl += "&deep_link=" + encodedDeepLink;

        console.log("--- 4. 最终生成的跳转链接: ---");
        console.log(finalUrl);

        // 4. 执行跳转 (延迟 400ms，确保FB像素有时间发出去)
        setTimeout(() => {
            window.location.href = finalUrl;
        }, 400);
    }

        // ==========================================
        // 2. 自动化演示逻辑
        // ==========================================
        const cursor = document.getElementById('cursor');
        const mainSlot = document.getElementById('main-slot');
        const btn = document.getElementById('fake-btn');
        const scanner = document.getElementById('scanner');
        const overlay = document.getElementById('result-overlay');
        const video = document.getElementById('demo-video');

        const demoAssets = [
            { id: 'asset-1', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-15_21-03-01.jpg?w=480&h=704', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/%E5%90%8E%E5%85%A5%E6%89%AD%E8%87%80.mp4' },
            { id: 'asset-2', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-17-33.jpg?w=480&h=704', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/3-2.mp4' },
            { id: 'asset-3', img: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/photo_2026-04-11_20-16-19.jpg?w=480&h=704', vid: 'https://69e74eaf19995cfcc32b1c4a.imgix.net/3-1.mp4' }
        ];

        async function runAutoDemo() {
            let index = 0;
            while (true) {
                const current = demoAssets[index % demoAssets.length];
                await reset();
                const assetEl = document.getElementById(current.id);
                await moveAndTap(assetEl);
                flyPhoto(current.img);
                await sleep(1000);
                await moveAndTap(btn);
                btn.style.backgroundColor = '#8b5cf6';
                btn.style.color = '#fff';
                btn.innerText = 'AI PROCESSING...';
                await runScanner();
                showResult(current.vid);
                await sleep(5000); // 结果停留
                index++;
            }
        }

        async function reset() {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
            document.querySelectorAll('.flying-photo').forEach(el => el.remove());
            btn.style.backgroundColor = '';
            btn.style.color = '';
            btn.innerText = 'GENERATE VIDEO';
            await sleep(500);
        }

        async function moveAndTap(target) {
            const rect = target.getBoundingClientRect();
            cursor.style.opacity = '1';
            cursor.style.transform = 'scale(1.2)';
            cursor.style.left = (rect.left + rect.width/2) + 'px';
            cursor.style.top = (rect.top + rect.height/2) + 'px';
            await sleep(600);
            cursor.style.transform = 'scale(0.8)';
            await sleep(200);
            cursor.style.transform = 'scale(1.2)';
            await sleep(200);
            cursor.style.opacity = '0';
        }

        function flyPhoto(url) {
            const photo = document.createElement('img');
            photo.src = url;
            photo.className = 'flying-photo w-16 h-16';
            const startRect = cursor.getBoundingClientRect();
            photo.style.left = startRect.left + 'px';
            photo.style.top = startRect.top + 'px';
            document.getElementById('stage').appendChild(photo);
            const targetRect = mainSlot.getBoundingClientRect();
            setTimeout(() => {
                photo.style.left = (targetRect.left + 5) + 'px';
                photo.style.top = (targetRect.top + 5) + 'px';
                photo.style.width = (targetRect.width - 10) + 'px';
                photo.style.height = (targetRect.height - 10) + 'px';
                photo.style.borderRadius = '25px';
            }, 50);
        }

        async function runScanner() {
            scanner.style.opacity = '1';
            for(let p=0; p<=100; p+=5) {
                scanner.style.top = p + '%';
                await sleep(40);
            }
            scanner.style.opacity = '0';
        }

        function showResult(vidUrl) {
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.opacity = '1'; }, 10);
            video.src = vidUrl;
            video.play().catch(e => console.log("Video play failed:", e));
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        window.onload = runAutoDemo;
    </script>
</body>
</html>
