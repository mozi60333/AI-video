<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiVideo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --panel: #0d0d0f;
            --line: rgba(255, 255, 255, 0.12);
            --text: #f7f7f7;
            --muted: #a2a2ad;
            --pink: #ff336d;
            --mint: #56f0d0;
            --blue: #566cff;
            --gold: #ffd166;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            overflow-x: hidden;
            overflow-y: auto;
            background:
                radial-gradient(circle at 18% 0%, rgba(255, 51, 109, 0.2), transparent 32%),
                radial-gradient(circle at 82% 8%, rgba(86, 108, 255, 0.18), transparent 31%),
                radial-gradient(circle at 54% 0%, rgba(86, 240, 208, 0.1), transparent 28%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        button, [role="button"] {
            -webkit-tap-highlight-color: transparent;
        }

        .page {
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            padding: 12px 14px 104px;
            position: relative;
        }

        .brand-row {
            width: 100%;
            max-width: 440px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 0 10px;
            border: 1px solid rgba(86, 240, 208, 0.36);
            border-radius: 8px;
            color: var(--mint);
            background: rgba(86, 240, 208, 0.08);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .hero-copy {
            width: 100%;
            max-width: 440px;
            margin: 0 auto 10px;
        }

        .eyebrow {
            color: var(--gold);
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.04;
            font-weight: 950;
            letter-spacing: 0;
        }

        h1 span {
            color: var(--pink);
        }

        .subhead {
            margin: 7px 0 0;
            color: #d1d1d8;
            font-size: 14px;
            line-height: 1.28;
            font-weight: 650;
        }

        .preview-card {
            width: min(100%, 38svh, 360px);
            aspect-ratio: 9 / 16;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.44);
            cursor: pointer;
            flex: none;
        }

        .preview-shot {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            opacity: 1;
            background: #000;
        }

        .preview-vignette {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, rgba(0, 0, 0, 0.16) 0%, rgba(0, 0, 0, 0.02) 36%, rgba(0, 0, 0, 0.06) 100%);
            pointer-events: none;
        }

        .sticky-cta {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, #050505 76%, rgba(5, 5, 5, 0));
        }

        .cta-inner {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        .download-btn {
            width: 100%;
            height: 58px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 0;
            border-radius: 8px;
            background: #ffffff;
            color: #050505;
            font-size: 17px;
            font-weight: 950;
            box-shadow: 0 14px 36px rgba(86, 108, 255, 0.3);
            cursor: pointer;
        }

        .store-icon {
            width: 22px;
            height: 22px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #050505;
        }

        .download-btn:active,
        .preview-card:active {
            transform: translateY(1px);
        }

        .cta-caption {
            margin: 9px 0 0;
            color: #8d8d96;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--mint);
            box-shadow: 0 0 18px var(--mint);
            opacity: 0;
            animation: spark 3s infinite;
        }

        .spark.one { left: 14%; top: 22%; animation-delay: 0.2s; }
        .spark.two { right: 16%; top: 34%; animation-delay: 1.1s; background: var(--blue); box-shadow: 0 0 18px var(--blue); }
        .spark.three { right: 28%; bottom: 24%; animation-delay: 1.8s; background: var(--gold); box-shadow: 0 0 18px var(--gold); }

        @keyframes spark {
            0%, 100% { transform: scale(0.4); opacity: 0; }
            36% { transform: scale(1); opacity: 0.85; }
            68% { transform: scale(0.65); opacity: 0.2; }
        }

        @media (min-width: 520px) {
            .page { padding-top: 20px; }
            h1 { font-size: 38px; }
            .preview-card { width: min(100%, 36svh, 420px); }
        }

        @media (max-height: 690px) {
            .page { padding-top: 8px; padding-bottom: 94px; }
            .brand-row { margin-bottom: 5px; }
            .brand { font-size: 15px; }
            .status-pill { min-height: 25px; font-size: 10px; }
            .eyebrow { font-size: 10px; margin-bottom: 4px; }
            h1 { font-size: 25px; }
            .subhead { font-size: 12px; margin-top: 5px; line-height: 1.22; }
            .hero-copy { margin-bottom: 8px; }
            .preview-card { width: min(100%, 36svh, 320px); }
            .sticky-cta { padding-top: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
            .download-btn { height: 54px; font-size: 16px; }
            .cta-caption { margin-top: 7px; font-size: 9px; }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="brand-row">
            <div class="brand" aria-label="AiVideo">
                <span>AiVideo</span>
            </div>
            <div class="status-pill">
                <i id="status-icon" class="fas fa-globe"></i>
                <span id="status-label">Web</span>
            </div>
        </div>

        <section class="hero-copy" aria-labelledby="hero-title">
            <div class="eyebrow">AI VIDEO FROM YOUR PHOTO</div>
            <h1 id="hero-title">Turn any photo into an AI video. <span>Start in seconds.</span></h1>
            <p class="subhead">Upload a photo, choose the vibe, and create a moving AI scene instantly with AiVideo.</p>
        </section>

        <section id="preview-card" class="preview-card" role="button" tabindex="0" aria-label="Start AiVideo">
            <video class="preview-shot" src="assets/veluna-video-preview.mp4" autoplay muted playsinline webkit-playsinline loop preload="auto" aria-label="AI video preview"></video>
            <div class="preview-vignette"></div>
            <span class="spark one"></span>
            <span class="spark two"></span>
            <span class="spark three"></span>
        </section>
    </main>

    <div class="sticky-cta">
        <div class="cta-inner">
            <button id="download-button" class="download-btn" type="button" onclick="handleAiVideoDownload(event)">
                <i id="cta-icon" class="store-icon fas fa-globe" aria-hidden="true"></i>
                <span id="cta-label">Create My AI Video</span>
            </button>
            <p id="cta-caption" class="cta-caption">Start online now. No install needed.</p>
        </div>
    </div>

    <script>
    const ANDROID_ADJUST_BASE = "https://s2s.adjust.com/20wx005j";
    const IOS_ADJUST_BASE = "https://s2s.adjust.com/1zs7eppj";
    const WEB_BASE = "https://pixpop.ai/start?source=tiktok&ttPixelID=D7ST7RBC77U1G0JPNAQ0";
    const FALLBACK_DELAY_MS = 1200;

    function getParamBag(source) {
        if (source instanceof URLSearchParams) return source;
        const query = typeof source === "string" ? source.replace(/^\?/, "") : (window.location.search || "");
        return new URLSearchParams(query);
    }

    function firstParam(params, keys) {
        for (const key of keys) {
            const value = params.get(key);
            if (value !== null && value.trim() !== "") return value.trim();
        }
        return "";
    }

    function encodeAdjustValue(value) {
        return encodeURIComponent(value);
    }

    function valueOrMacro(params, keys, macro) {
        const value = firstParam(params, keys);
        return value ? encodeAdjustValue(value) : macro;
    }

    function labeledValue(params, directKeys, nameKeys, idKeys, fallbackName, fallbackId) {
        const directValue = firstParam(params, directKeys);
        if (directValue) return encodeAdjustValue(directValue);

        const name = firstParam(params, nameKeys);
        const id = firstParam(params, idKeys);
        if (name || id) {
            return `${encodeAdjustValue(name || fallbackName)}%20(${encodeAdjustValue(id || fallbackId)})`;
        }

        return `${fallbackName}%20(${fallbackId})`;
    }

    function detectPlatform(userAgent, platformName, maxTouchPoints) {
        const ua = userAgent || navigator.userAgent || "";
        const platform = platformName || navigator.platform || "";
        const touchPoints = typeof maxTouchPoints === "number" ? maxTouchPoints : (navigator.maxTouchPoints || 0);
        const isIPadOS = platform === "MacIntel" && touchPoints > 1;

        if (/android/i.test(ua)) return "android";
        if (/iPad|iPhone|iPod/i.test(ua) || isIPadOS) return "ios";
        return "web";
    }

    function buildAdjustUrl(baseUrl, sourceParams, userAgent) {
        const params = getParamBag(sourceParams);
        const clickId = firstParam(params, ["ttclid", "callback_param"]);
        const pairs = [
            ["campaign", labeledValue(params, ["campaign"], ["campaign_name"], ["campaign_id"], "__CAMPAIGN_NAME__", "__CAMPAIGN_ID__")],
            ["adgroup", labeledValue(params, ["adgroup"], ["aid_name", "adgroup_name"], ["aid", "adgroup_id"], "__AID_NAME__", "__AID__")],
            ["creative", labeledValue(params, ["creative"], ["cid_name", "creative_name"], ["cid", "creative_id"], "__CID_NAME__", "__CID__")],
            ["ttclid", clickId ? encodeAdjustValue(clickId) : "__callback_param__"],
            ["adgroup_id", valueOrMacro(params, ["adgroup_id", "aid"], "__AID__")],
            ["ip_address", valueOrMacro(params, ["ip_address", "ip"], "__IP__")],
            ["user_agent", encodeAdjustValue(userAgent || navigator.userAgent || "__UA__")],
            ["campaign_id", valueOrMacro(params, ["campaign_id"], "__CAMPAIGN_ID__")],
            ["creative_id", valueOrMacro(params, ["creative_id", "cid"], "__CID__")],
            ["tracker_limit", "250000"],
            ["tiktok_placement", valueOrMacro(params, ["tiktok_placement", "placement"], "__PLACEMENT__")],
            ["external_tracker_ids", "1"]
        ];

        return `${baseUrl}?${pairs.map(([key, value]) => `${key}=${value}`).join("&")}`;
    }

    function buildWebUrl(sourceParams) {
        const params = getParamBag(sourceParams);
        const clickId = firstParam(params, ["ttclid", "callback_param"]);
        const webUrl = new URL(WEB_BASE);
        if (clickId) webUrl.searchParams.set("ttclid", clickId);
        return webUrl.toString();
    }

    function buildStoreUrl(platform, sourceParams, userAgent) {
        if (platform === "android") return buildAdjustUrl(ANDROID_ADJUST_BASE, sourceParams, userAgent);
        if (platform === "ios") return buildAdjustUrl(IOS_ADJUST_BASE, sourceParams, userAgent);
        return buildWebUrl(sourceParams);
    }

    function getPlatformConfig(platform) {
        if (platform === "android") {
            return {
                status: "Google Play",
                cta: "Get AiVideo on Google Play",
                caption: "Install the app, upload a photo, and start creating.",
                iconClass: "store-icon fab fa-google-play",
                aria: "Get AiVideo on Google Play"
            };
        }

        if (platform === "ios") {
            return {
                status: "App Store",
                cta: "Get AiVideo on the App Store",
                caption: "Install the app, upload a photo, and start creating.",
                iconClass: "store-icon fab fa-apple",
                aria: "Get AiVideo on the App Store"
            };
        }

        return {
            status: "Web",
            cta: "Create My AI Video",
            caption: "Start online now. No install needed.",
            iconClass: "store-icon fas fa-globe",
            aria: "Create an AI video on the web"
        };
    }

    function updateUiForPlatform() {
        const platform = detectPlatform();
        const config = getPlatformConfig(platform);
        document.documentElement.dataset.platform = platform;
        document.getElementById("status-label").textContent = config.status;
        document.getElementById("status-icon").className = config.iconClass.replace("store-icon ", "");
        document.getElementById("cta-icon").className = config.iconClass;
        document.getElementById("cta-label").textContent = config.cta;
        document.getElementById("cta-caption").textContent = config.caption;
        document.getElementById("download-button").setAttribute("aria-label", config.aria);
        document.getElementById("preview-card").setAttribute("aria-label", config.aria);
    }

    let redirectStarted = false;
    function handleAiVideoDownload(event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }

        if (redirectStarted) return;
        redirectStarted = true;

        const params = getParamBag();
        const platform = detectPlatform();
        const webUrl = buildWebUrl(params);

        if (platform === "web") {
            window.location.assign(webUrl);
            return;
        }

        const storeUrl = buildStoreUrl(platform, params);
        let openedWindow = null;

        try {
            openedWindow = window.open(storeUrl, "_blank");
        } catch (err) {
            openedWindow = null;
        }

        if (!openedWindow) {
            window.location.assign(webUrl);
            return;
        }

        try {
            openedWindow.opener = null;
        } catch (err) {
            console.warn("Unable to clear opener for store window.", err);
        }

        window.setTimeout(() => {
            window.location.assign(webUrl);
        }, FALLBACK_DELAY_MS);
    }

    const previewCard = document.getElementById("preview-card");
    previewCard.addEventListener("click", handleAiVideoDownload);
    previewCard.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
            handleAiVideoDownload(event);
        }
    });

    updateUiForPlatform();

    window.aiVideoLanding = {
        detectPlatform,
        buildAdjustUrl,
        buildStoreUrl,
        buildWebUrl,
        getPlatformConfig
    };
    </script>
</body>
</html>
